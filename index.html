<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immagine Studios</title>
  <meta name="description" content="Immagine Studios is building the future of outdoor design." />
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.72);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: rgba(255,255,255,0.12);
      --accent: #cbd5e1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(148, 163, 184, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 25%),
        linear-gradient(135deg, #020617 0%, #0f172a 55%, #111827 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 56px 40px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.25rem, 5vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.7;
      color: var(--accent);
      max-width: 36rem;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 32px 0 24px;
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.95rem;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid rgba(229, 231, 235, 0.35);
      transition: border-color 0.2s ease, opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.9;
      border-color: rgba(229, 231, 235, 0.8);
    }

    @media (max-width: 640px) {
      .card {
        padding: 40px 24px;
        border-radius: 20px;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Immagine Studios</div>
    <h1>Design is changing.</h1>
    <p>
      Immagine Studios is building modern software for the future of outdoor design.
      More to come soon.
    </p>

    <div class="divider"></div>

    <div class="footer">
      <span>Currently online at immaginestudios.tech</span>
      <a href="mailto:hello@immaginestudios.tech">hello@immaginestudios.tech</a>
    </div>
  </main>
</body>
</html>
